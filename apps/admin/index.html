<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TradeScope AI — Admin Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root,[data-theme="light"]{--color-bg:#F8F9FB;--color-surface:#FFF;--color-card:#FFF;--color-card-alt:#F8F9FB;--color-input:#F8F9FB;--color-hover:#F3F4F6;--color-text:#111827;--color-text-secondary:#6B7280;--color-text-tertiary:#9CA3AF;--color-accent:#2563EB;--color-accent-hover:#1D4ED8;--color-success:#059669;--color-success-bg:rgba(5,150,105,.08);--color-danger:#DC2626;--color-danger-bg:rgba(220,38,38,.08);--color-warning:#D97706;--color-purple:#7C3AED;--color-border:#E5E7EB;--color-border-light:#F3F4F6;--shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 12px rgba(0,0,0,.06);--shadow-lg:0 12px 32px rgba(0,0,0,.08);--font-sans:'Inter',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace}
      [data-theme="dark"]{--color-bg:#0D1117;--color-surface:#161B22;--color-card:#1C2128;--color-card-alt:#161B22;--color-input:#0D1117;--color-hover:#21262D;--color-text:#E6EDF3;--color-text-secondary:#8B949E;--color-text-tertiary:#6E7681;--color-accent:#58A6FF;--color-accent-hover:#79C0FF;--color-success:#3FB950;--color-success-bg:rgba(63,185,80,.08);--color-danger:#F85149;--color-danger-bg:rgba(248,81,73,.08);--color-warning:#D29922;--color-purple:#BC8CFF;--color-border:#30363D;--color-border-light:#21262D;--shadow-sm:0 1px 2px rgba(0,0,0,.2);--shadow-md:0 4px 12px rgba(0,0,0,.3);--shadow-lg:0 12px 32px rgba(0,0,0,.4)}
      body{margin:0;background:var(--color-bg);color:var(--color-text);font-family:var(--font-sans);font-size:14px;-webkit-font-smoothing:antialiased}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
